name: CI
on:
  push:
    branches:
      - master
  pull_request:
env:
  APP_IMAGE_NAME: ymyzk/mypy-playground
  SANDBOX_IMAGE_NAME: ymyzk/mypy-playground-sandbox
  DOCKER_BUILDKIT: 1
jobs:
  test_app:
    needs:
      - test_frontend
    name: Test app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: frontend
        path: app/static
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --frozen
      working-directory: ./app
    - name: Run type checking
      run: uv run mypy .
      working-directory: ./app
    - name: Run pre-commit
      run: uv run pre-commit run --all-files
      working-directory: ./app
    - name: Run tests
      run: uv run pytest
      working-directory: ./app

  test_frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, 25.x]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: npm ci
      working-directory: ./app/frontend
    - name: Build, lint, and test frontend
      run: |
        npm run build
        npm run format:ci
        npm run lint
        npm run test:ci
      working-directory: ./app/frontend
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: matrix.node-version == '24.x'
      with:
        name: frontend
        path: app/frontend/dist

  build_docker_images:
    name: Build and push Docker images
    needs:
      - test_app
      - test_frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker version
      - name: Build app image for development
        run: docker build --pull -t app:dev -f ./app/dockerfile/dev/Dockerfile ./app
      - name: Build app image for production
        run: docker build --pull -t app:latest -f ./app/dockerfile/prod/Dockerfile ./app
      - name: Build latest Docker sandbox image
        run: docker build -t sandbox:latest ./sandbox/docker/latest
      - name: Build Docker sandbox images
        run: ./sandbox/docker/build.sh $SANDBOX_IMAGE_NAME
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Push app image
        run: |
          docker tag app:latest $APP_IMAGE_NAME:latest
          docker push $APP_IMAGE_NAME:latest
      - name: Push Docker sandbox images
        run: ./sandbox/docker/push.sh $SANDBOX_IMAGE_NAME

  dependabot:
    runs-on: ubuntu-latest
    needs:
      - test_app
      - test_frontend
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    name: Automatically merge Dependabot PRs
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for Dependabot PRs (patch)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for Dependabot PRs (minor)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' && (contains(steps.metadata.outputs.dependency-names, '@types/'))
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
